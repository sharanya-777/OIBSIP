<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Simple gradient to look clean but professional -->
    <linearGradient id="avatar-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>
  
  <!-- Outer border -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#e5e7eb" stroke-width="4"/>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="92" fill="#f3f4f6" />
  
  <!-- Head/Face -->
  <circle cx="100" cy="85" r="32" fill="url(#avatar-grad)" opacity="0.85"/>
  
  <!-- Body/Shoulders -->
  <path d="M50 160c0-18 15-32 32-32h36c17 0 32 14 32 32v12H50v-12z" fill="url(#avatar-grad)" />
  
  <!-- Text initials overlay (very student/portfolio-like) -->
  <text x="100" y="90" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">JSY</text>
</svg>
